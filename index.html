<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Screen Video Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background-color: #0b0b0b;
      color: #eaeaea;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      box-sizing: border-box;
      width: 100vw;
      height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }
    .header {
      margin-bottom: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #ff3b30;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 12px;
      padding-bottom: 20px;
    }
    /* Style container and child elements */
    .grid div {
      width: 100%;
      aspect-ratio: 9 / 16;
      border: 2px solid #222;
      border-radius: 6px;
      background-color: #000;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .grid div:hover {
      border-color: #ff3b30;
      transform: scale(1.03);
      box-shadow: 0 6px 12px rgba(255, 59, 48, 0.2);
    }
    /* Click to unmute overlay banner */
    .audio-banner {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(255, 59, 48, 0.9);
      color: #fff;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
      z-index: 1000;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.5s ease;
      pointer-events: none; /* Make body clicks pass through */
    }
    .error-msg {
      text-align: center;
      font-size: 16px;
      color: #aaa;
      margin-top: 50px;
      grid-column: span 10;
    }
    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="sound-banner" class="audio-banner">Click anywhere on page to activate audio at 1% volume</div>
  <div class="header" id="dashboard-title">Multi-Screen Monitor Grid</div>
  <div class="grid" id="video-grid"></div>

  <!-- Load YouTube Player API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    // Extract parameters from URL search query
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('v') || 'HZDnS7l0-dk';
    const count = parseInt(urlParams.get('c')) || 50;

    const gridContainer = document.getElementById('video-grid');
    const titleElement = document.getElementById('dashboard-title');
    const soundBanner = document.getElementById('sound-banner');

    titleElement.textContent = `Multi-Screen Monitor Grid (${count} active elements)`;

    const players = [];

    // This callback function is automatically executed by YouTube IFrame API once loaded
    function onYouTubeIframeAPIReady() {
      if (!videoId) {
        gridContainer.innerHTML = '<div class="error-msg">Please specify a video ID parameter, e.g., ?v=VIDEO_ID</div>';
        return;
      }

      for (let i = 0; i < count; i++) {
        // Create player container div
        const playerDiv = document.createElement('div');
        playerDiv.id = `yt-player-${i}`;
        gridContainer.appendChild(playerDiv);

        // Initialize YouTube player
        const player = new YT.Player(`yt-player-${i}`, {
          height: '100%',
          width: '100%',
          videoId: videoId,
          playerVars: {
            autoplay: 1,
            mute: 1, // Must start muted to bypass browser autoplay blocks
            loop: 1,
            playlist: videoId, // Required for loop parameter to work on embed
            controls: 0,       // Hide controls
            rel: 0,
            modestbranding: 1
          },
          events: {
            onReady: (event) => {
              event.target.playVideo();
            }
          }
        });
        players.push(player);
      }
    }

    // Set up click handler to unmute and set volume to 1% on body click
    document.body.addEventListener('click', () => {
      players.forEach(player => {
        try {
          if (player && typeof player.setVolume === 'function') {
            player.unMute();
            player.setVolume(1); // Set volume to 1% (range: 0 to 100)
            player.playVideo();
          }
        } catch (e) {
          console.warn("Failed to set player volume:", e);
        }
      });
      // Fade out the banner
      soundBanner.style.opacity = '0';
      setTimeout(() => {
        soundBanner.style.display = 'none';
      }, 500);
    });
  </script>
</body>
</html>
